name: Test
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
env:
  CARGO_TERM_COLOR: always
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings
      - name: Test (default features)
        run: cargo test -p hmrc-rates
      - name: Test (all features)
        run: cargo test -p hmrc-rates --all-features
      - name: Check (no default features)
        run: cargo check -p hmrc-rates --no-default-features
      - name: Docs
        run: cargo doc -p hmrc-rates --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Check no_std wasm build
        run: cargo check -p hmrc-rates --target wasm32-unknown-unknown --no-default-features --features bundled
